<!DOCTYPE html>
<html>

<head>

<title>Mouse Analyzer</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
    padding:40px;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.menu-btn{
    background:#334155;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;
}

.menu-btn:hover{
    background:#475569;
}

.card{
    background:rgba(255,255,255,0.08);
    padding:30px;
    border-radius:20px;
    max-width:700px;
    margin:auto;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#4f46e5;
    color:white;
    font-size:18px;
    cursor:pointer;
    margin-top:15px;
}

button:hover{
    transform:scale(1.02);
}

.test-box{
    background:rgba(255,255,255,0.08);
    padding:20px;
    border-radius:15px;
    margin-top:20px;
}

select{
    width:100%;
    padding:10px;
    margin-top:10px;
    margin-bottom:15px;
}

</style>

</head>

<body>

<div class="top-bar">
    <h2>🎯 Mouse Analyzer</h2>

    <button class="menu-btn" onclick="window.location.href='/'">
        ⬅ Back to Menu
    </button>
</div>

<div class="card">

    <h3>Game Type</h3>
    <select id="usage">
        <option value="gaming">Gaming</option>
        <option value="work">Work</option>
    </select>

    <h3>Mouse Weight</h3>
    <select id="weight">
        <option value="light">Light</option>
        <option value="medium">Medium</option>
        <option value="heavy">Heavy</option>
    </select>

    <h3>Grip Style</h3>
    <select id="grip">
        <option value="palm">Palm</option>
        <option value="claw">Claw</option>
        <option value="fingertip">Fingertip</option>
    </select>

    <button id="startBtn">🚀 Start Analysis</button>

</div>

<div id="testArea"></div>

<script>

let reactionTime = 0;
let accuracy = 0;
let speed = 0;

let hits = 0;
let startTime = 0;
let aimStart = 0;

const startBtn = document.getElementById("startBtn");
const testArea = document.getElementById("testArea");

startBtn.onclick = () => {
    document.querySelector(".card").style.display = "none";
    startReaction();
};

// ---------------- REACTION ----------------

function startReaction(){

testArea.innerHTML = `
<div class="test-box">
<h2>⚡ Reaction Test</h2>
<button id="rbtn" disabled>Wait...</button>
<p id="out"></p>
</div>
`;

const btn = document.getElementById("rbtn");

setTimeout(() => {
    btn.disabled = false;
    btn.style.background = "green";
    btn.innerText = "CLICK!";
    startTime = Date.now();
}, Math.random()*2500 + 1500);

btn.onclick = () => {

reactionTime = Date.now() - startTime;

document.getElementById("out").innerText =
`Reaction: ${reactionTime} ms`;

setTimeout(startAim, 1500);

};

}

// ---------------- AIM ----------------

function startAim(){

hits = 0;
aimStart = Date.now();

testArea.innerHTML = `
<div class="test-box">
<h2>🎯 Aim Test</h2>
<h3 id="score">0 / 10</h3>
<div id="field" style="position:relative;height:400px;background:#1e293b;border-radius:15px;"></div>
</div>
`;

const field = document.getElementById("field");

spawn();

function spawn(){

const t = document.createElement("div");

t.style.width = "40px";
t.style.height = "40px";
t.style.borderRadius = "50%";
t.style.background = "red";
t.style.position = "absolute";

t.style.left = Math.random()*85 + "%";
t.style.top = Math.random()*80 + "%";

field.appendChild(t);

t.onclick = () => {
t.remove();
hits++;
document.getElementById("score").innerText = `${hits}/10`;

if(hits < 10) spawn();
else finish();
};

}

}

// ---------------- FINAL SYSTEM ----------------

function finish(){

const usage = document.getElementById("usage").value;
const weight = document.getElementById("weight").value;
const grip = document.getElementById("grip").value;

const time = (Date.now() - aimStart)/1000;

accuracy = hits * 10;
speed = hits / time;

// base performance
let score = 0;

score += (100 - reactionTime/5);   // reaction impact
score += accuracy * 2;
score += speed * 20;

// mouse physics penalty

if(weight === "heavy") score -= 25;
if(weight === "light") score += 10;

if(grip === "fingertip") score += 10;
if(grip === "palm") score -= 5;

// usage weighting

let verdict = "";

if(usage === "gaming"){
score += 10;

if(score > 180) verdict = "🔥 PERFECT GAMING FIT";
else if(score > 130) verdict = "👍 OK FOR GAMING";
else verdict = "❌ NOT GOOD FOR GAMING";
}

if(usage === "work"){
score += 20;

if(score > 170) verdict = "🔥 PERFECT WORK MOUSE";
else if(score > 120) verdict = "👍 OK FOR WORK";
else verdict = "❌ NOT SUITABLE FOR WORK";
}

testArea.innerHTML = `

<div class="test-box">

<h2>📊 FINAL RESULT</h2>

<p>Reaction: ${reactionTime} ms</p>
<p>Accuracy: ${accuracy}%</p>
<p>Speed: ${speed.toFixed(2)} hits/sec</p>

<h2>${verdict}</h2>

</div>

`;

}

</script>

</body>
</html>
